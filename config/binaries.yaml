# Standalone binaries downloaded from release URLs (brew-equivalent tools, so the
# image needs no linuxbrew). install/binaries.sh fetches each into /usr/local/bin.
# {ARCH} -> dpkg --print-architecture (amd64/arm64). {KVER} -> latest kubectl.
# kind: raw   = the URL is the executable itself.
# kind: targz = tarball; .extract lists path(s) inside to install (basename kept).
tools:
  - name: kubectl
    kind: raw
    url: "https://dl.k8s.io/release/{KVER}/bin/linux/{ARCH}/kubectl"
  - name: talosctl
    kind: raw
    url: "https://github.com/siderolabs/talos/releases/latest/download/talosctl-linux-{ARCH}"
  - name: yq
    kind: raw
    url: "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_{ARCH}"
  - name: k9s
    kind: targz
    url: "https://github.com/derailed/k9s/releases/latest/download/k9s_Linux_{ARCH}.tar.gz"
    extract: [k9s]
  - name: kubeconform
    kind: targz
    url: "https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-{ARCH}.tar.gz"
    extract: [kubeconform]
  - name: cilium
    kind: targz
    url: "https://github.com/cilium/cilium-cli/releases/latest/download/cilium-linux-{ARCH}.tar.gz"
    extract: [cilium]
  # age embeds the version in its asset name, so the latest/download form can't
  # serve it — pin the release tag (Renovate can bump this).
  - name: age
    kind: targz
    url: "https://github.com/FiloSottile/age/releases/download/v1.3.1/age-v1.3.1-linux-{ARCH}.tar.gz"
    extract: [age/age, age/age-keygen]
  - name: talhelper
    kind: targz
    url: "https://github.com/budimanjojo/talhelper/releases/latest/download/talhelper_linux_{ARCH}.tar.gz"
    extract: [talhelper]
  # SOPS — REQUIRED for home-ops (its secrets are SOPS+age encrypted). The asset
  # embeds the version, so pin the tag (Renovate can bump). Pairs with age above.
  - name: sops
    kind: raw
    url: "https://github.com/getsops/sops/releases/download/v3.9.1/sops-v3.9.1.linux.{ARCH}"
  # aws-vault — AWS credential helper (14x). Asset name matches {ARCH}; raw exe.
  - name: aws-vault
    kind: raw
    url: "https://github.com/99designs/aws-vault/releases/download/v7.2.0/aws-vault-linux-{ARCH}"
  # crictl — CRI debugging CLI for k8s/talos nodes (13x). Asset embeds version, so
  # pin the tag (Renovate can bump). {ARCH} = amd64/arm64 matches the asset.
  - name: crictl
    kind: targz
    url: "https://github.com/kubernetes-sigs/cri-tools/releases/download/v1.36.0/crictl-v1.36.0-linux-{ARCH}.tar.gz"
    extract: [crictl]
