# Base-image apt packages. install/apt.sh installs everything under .packages[].
# Add or remove a line and rebuild — this is the single source of truth for apt.
# Reconciled against inventory/tool-usage-report.md (atuin + transcript usage).
# Third-party-repo packages live in apt-repos.yaml; binaries in binaries.yaml.
#
# Intentionally EXCLUDED (verify-set — move here to re-enable):
#   php-cli php8.2-cli php8.4-cli  python3.11  dotnet-runtime-9.0  redis-tools
#   python3-nltk python3-numpy python3-tqdm   nmap  wireguard-tools  restic
packages:
  # --- core shell + fetch ---
  - ca-certificates
  - curl
  - wget
  - gnupg
  - gnupg-agent
  - dirmngr
  - apt-transport-https
  - sudo
  - locales
  - tzdata
  - bash-completion
  - openssh-client
  # uuid-runtime provides `uuidgen` — used by the worklog hook for session IDs
  # (found missing by a hook fire-drill, not by file-presence diffs).
  - uuid-runtime
  # --- CLI workhorses (git 8946, gh 2209, jq 316, sqlite3 442) ---
  - zsh
  - tmux
  - git
  - git-lfs
  - git-filter-repo
  # git-crypt — REQUIRED to commit to the claude-config repo (master-prompts/**,
  # skills/inner-ally/**, CLAUDE.md, scripts/** are encrypted). Was a runtime apt
  # install that pod rolls kept wiping (it's on the ephemeral rootfs) → bake it in.
  - git-crypt
  - gh
  - vim-tiny
  - nano
  - less
  - tree
  - htop
  - jq
  - sqlite3
  - ripgrep
  - fd-find
  - rsync
  - unzip
  - zip
  - xz-utils
  - p7zip-full
  - patch
  - sshpass
  - apache2-utils
  - mkdocs
  - direnv
  # --- quality-of-life CLI (fd-find above installs as `fdfind` -> symlinked to
  #     `fd` in the Dockerfile; `bat` installs as `batcat` -> symlinked too) ---
  - fzf
  - bat
  - zoxide
  - shellcheck
  - hugo
  # --- android tooling (adb 16x — handheld/bootible work) ---
  - android-tools-adb
  # NOTE: no in-pod container runtime — Talos nodes disable user namespaces
  # (user.max_user_namespaces=0), so rootless/root podman can't run containers.
  # Build images in CI (GitHub Actions → GHCR/zot); inspect with skopeo (above).
  # --- build toolchain + headers (compile deps for python/rust/native) ---
  - build-essential
  - cmake
  - pkg-config
  - binutils
  - llvm
  - python3
  - python3-dev
  - python3-pip
  - python3-venv
  - pipx
  - libssl-dev
  - libffi-dev
  - libbz2-dev
  - liblzma-dev
  - libsqlite3-dev
  - libreadline-dev
  - zlib1g-dev
  - libxml2-dev
  - libxmlsec1-dev
  - default-libmysqlclient-dev
  # --- media + OCI image tooling ---
  - ffmpeg
  - imagemagick
  - skopeo
  # --- net + storage (nfs/cifs = TrueNAS mounts, kernel-invoked) ---
  - dnsutils
  - iproute2
  - iputils-ping
  - netcat-openbsd
  - nfs-common
  - cifs-utils
  # rclone is installed via scripts.yaml (current release), NOT apt — Ubuntu's
  # apt rclone (v1.60) is REJECTED by Backblaze B2 ("API version number 1").
  # --- fonts ---
  - fonts-firacode
  - fonts-liberation
  - fonts-noto-color-emoji
  # --- headless-browser / Playwright MCP runtime deps ---
  - libnss3
  - libnspr4
  - libatk1.0-0t64
  - libatk-bridge2.0-0t64
  - libcups2t64
  - libdrm2
  - libgbm1
  - libxkbcommon0
  - libxcomposite1
  - libxdamage1
  - libxrandr2
  - libpango-1.0-0
  - libcairo2
  - libasound2t64
  - dbus-x11
  - xvfb
  - x11-utils
  - xclip
