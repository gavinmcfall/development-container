# Global npm packages, installed with the nvm-managed node (install/npm.sh).
# These are AI CLIs used alongside Claude Code (codex used 26x in the audit).
packages:
  - "@openai/codex"
  - "@google/gemini-cli"
  # any-buddy: Claude Code companion pet, driven by the `any-buddy apply` hook in
  # settings.json. Was only listed in the (disabled) Brewfile, so the build never
  # installed it and devpod-doctor flagged it as a missing hook command.
  - "any-buddy"
