# Tools installed via their official install scripts (run as-is by install/scripts.sh).
# One entry per tool; .cmd runs in /bin/sh. Keep to trusted vendor installers.
installers:
  - name: flux
    cmd: "curl -fsSL https://fluxcd.io/install.sh | bash"
  - name: helm
    cmd: "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
  - name: starship
    cmd: "curl -fsSL https://starship.rs/install.sh | sh -s -- -y"
  - name: chezmoi
    cmd: 'sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin'
  - name: task
    cmd: 'sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin'
  - name: kustomize
    cmd: "curl -fsSL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash -s -- /usr/local/bin"
  # AWS CLI v2 (125x) — official bundled installer (needs unzip, in apt.yaml).
  - name: awscli
    cmd: 'tmp=$(mktemp -d); curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-$(uname -m).zip" -o "$tmp/awscliv2.zip" && unzip -q "$tmp/awscliv2.zip" -d "$tmp" && "$tmp/aws/install" && rm -rf "$tmp"'
  # git-delta (better git diffs) — .deb matches dpkg arch; pinned (Renovate bumps).
  - name: delta
    cmd: 'tmp=$(mktemp -d); curl -fsSL "https://github.com/dandavison/delta/releases/download/0.19.2/git-delta_0.19.2_$(dpkg --print-architecture).deb" -o "$tmp/delta.deb" && dpkg -i "$tmp/delta.deb" && rm -rf "$tmp"'
  # rclone — CURRENT release (apt's v1.60 is rejected by Backblaze B2). Official
  # installer drops the latest static binary into /usr/bin.
  - name: rclone
    cmd: 'curl -fsSL https://rclone.org/install.sh | bash'
