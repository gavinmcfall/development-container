---
name: build
on:
  push:
    branches: ["main"]
    paths: ["Dockerfile", "config/**", "install/**", ".github/workflows/build.yaml"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/gavinmcfall/development-container:latest
            ghcr.io/gavinmcfall/development-container:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
